<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtually a Plant</title>
    <link rel="stylesheet" href="../styles/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="../Homepage/favicon.ico" />
</head>
<body>

  <header class="main-header">
    <h1>Virtually a Plant</h1>
  </header>

  <main class="container">
    <section class="left-side">
      <div class="intro-text">
        <h3>Evaluate the efficiency, variable usage and style of your code!</h3>
        <h3>Upload to Check</h3>
      </div>

      <label for="file-upload" class="upload-box">
        <span class="upload-title">Upload File</span>
        <span class="file-info">Supported: .java, .py, .js, .html, .css</span>
        <pre id="file-content"></pre> </label>

      <input type="file" id="file-upload" style="display: none;" />
      <div id="file-meta" style="font-size:0.8rem; color: var(--second-font); margin-top: 5px;"></div>
      <button type="button" class="submit-btn">Submit</button>
    </section>

    <section class="right-side">
      <div class="score-container">
        <span id="score-value">XX</span>%
      </div>

      <div id="category-scores" style="margin-top:10px; font-size:0.95rem;">
        <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content: center;">
          <div>
            <a href="../Cleanliness/details.html" class="score-detail-link" target="_blank" rel="noopener">
                <strong>Cleanliness:</strong> <span id="score-clean">—</span>
            </a>
            <div class="advice-text" id="advice-clean"></div>
          </div>
          <div>
            <a href="../Correctness/details.html" class="score-detail-link" target="_blank" rel="noopener">
                <strong>Correctness:</strong> <span id="score-correct">—</span>
            </a>
            <div class="advice-text" id="advice-correct"></div>
          </div>
          <div>
            <a href="../Structure/details.html" class="score-detail-link" target="_blank" rel="noopener">
                <strong>Structure:</strong> <span id="score-structure">—</span>
            </a>
            <div class="advice-text" id="advice-structure"></div>
          </div>
        </div>
      </div>

  <div id="plant-wrapper">
    <img id="plant-image" src="img/plant10.png">
  </div>
</section>


      <div class="score-container">
    </section>
  </main>

  <footer class="main-footer">
    <div class="footer-links">
      <a href="#">About Us</a>
      <a href="#">Contact Us</a>
    </div>
  </footer>

  <script src="../Homepage/script.js"></script>
</body>
</html>
